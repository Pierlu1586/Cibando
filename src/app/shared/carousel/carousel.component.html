<div *ngIf="foods.length > 1; else noCarousel" id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button *ngFor="let food of foods; let i = index" type="button" data-bs-target="#carouselExampleIndicators" [class.active]="i===0" [attr.data-bs-slide-to]="i"></button>
  </div>
  <div class="carousel-inner">
   <div class="carousel-item active" *ngFor="let food of foods; let i = index" [class.active]="i === 0">
      <img [src]="pathFoodsPictures + food.id + '.jpg'" class="d-block" [alt]="food.label">
      <div class="carousel-caption d-none d-md-block">
        <h3 class="label-carousel">{{food.label}}</h3>
        <h6 style="margin-top: 20px;">Immagine {{i+1}} di {{foods.length}}</h6>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<ng-template #noCarousel>
  <div>
    <img [src]="pathFoodsPictures + foods[0].id + '.jpg'" [alt]="foods[0].label">
  </div>
</ng-template>
