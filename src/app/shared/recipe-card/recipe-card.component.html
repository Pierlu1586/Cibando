<div class="card" style="width: 20rem" >

  <img
    [src]="recipe.image"
    class="card-img-top card-image"
    [alt]="recipe.title"
    (mouseenter)="onRecipeSelected(recipe.title, recipe.difficulty)"
    (mouseleave)="onRecipeSelected('', undefined)"
  />

  <div class="card-body">
    <h5 class="card-title">{{ recipe.title }}</h5>
    <p class="card-text">{{ recipe.description }}</p>
    <a
      class="btn btn-color-custom"
      routerLink="dettaglio/{{ recipe.title }}/{{ recipe._id }}"
      >Visualizza</a
    >
  </div>

</div>
