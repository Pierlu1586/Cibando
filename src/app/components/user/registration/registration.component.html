<div class="contenitore">
  <div class="card mb-3">
    <div class="row">
      <div class="image-container">
        <img
          src="../../../../assets/images/food.jpg"
          class="img-fluid rounded"
          alt="Alimenti"
        />
      </div>

      <div class="form-container">
        <div class="card-body">
          <h2 class="card-title">Registrati su Cibando</h2>
          <form #form="ngForm" (ngSubmit)="onSubmit(form.value)">

            <div class="form-field">
              <label for="nameField" class="form-label">Nome</label>
              <input type="text" class="form-control" id="nameField" name="nome" ngModel required #nome="ngModel"/>
              <div class="valid-feedback">Looks good!</div>
              <div *ngIf="nome.hasError('required') && nome.touched" class="invalid">- Il campo nome è obbligatorio</div>
            </div>

            <div class="form-field">
              <label for="surnameField" class="form-label">Cognome</label>
              <input type="text" class="form-control" id="surnameField" name="cognome" ngModel required #cognome="ngModel"/>
              <div class="valid-feedback">Looks good!</div>
              <div *ngIf="cognome.hasError('required') && cognome.touched" class="invalid">- Il campo cognome è obbligatorio</div>
            </div>

            <div class="form-field">
              <label for="emailField" class="form-label">Email</label>
              <input type="email" class="form-control" id="emailField" placeholder="name@example.com" name="email" ngModel email required #email="ngModel"/>
              <div *ngIf="email.hasError('email') && email.touched" class="invalid">- L'email inserita non è valida</div>
              <div *ngIf="email.hasError('required') && email.touched" class="invalid"> - Il campo email è obbligatorio</div>
            </div>

            <div class="form-field">
              <label for="passwordField" class="form-label">Password</label>
              <input type="password" class="form-control" id="passwordField" name="password" ngModel required #password="ngModel"/>
              <div class="valid-feedback">Looks good!</div>
              <div *ngIf="password.hasError('required') && password.touched" class="invalid"> - Il campo password è obbligatorio</div>
            </div>

            <div class="form-field">
              <label for="validationCustom01" class="form-label">Conferma password</label>
              <input type="password" class="form-control" id="validationCustom01" name="confirmPassword" ngModel required #confirmPassword="ngModel"/>
              <div *ngIf="confirmPassword.hasError('required') && confirmPassword.touched" class="invalid"> - Il campo conferma password è obbligatorio</div>
            </div>

            <div class="form-field">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault" name="termsOfService" ngModel required/>
              <label class="form-check-label" for="checkDefault">Dichiaro di accettare i <a href="">Termini del Servizio</a></label>
            </div>

            <div>
              <button type="submit" class="btn submit-btn" [disabled]="form.invalid">Registrati</button>
            </div>


          </form>
        </div>
      </div>
    </div>
  </div>
