<div class="contenitore">
  <h2>Le nostre ricette</h2>
  <p *ngIf="titoloRicettaCliccata" class="difficulty-container">
    <strong>Ricetta:&nbsp;</strong> {{ titoloRicettaCliccata }} <strong>&nbsp;Difficoltà:</strong>
    <img
      [src]="pathDifficulty + difficoltaRicettaCliccata + '.png'"
      class="difficulty"
    />
  </p>
  <span><a routerLink="aggiungi_ricetta">Aggiungi ricetta</a></span>
  <div class="card-container">
    <!-- Rimuovi lo slice per vederle tutte"-->
    <app-recipe-card
      *ngFor="let ricetta of ricette | slice: (page * ricettePerPagina) -  ricettePerPagina : page * ricettePerPagina"
      [recipe]="ricetta"
      (recipeEmitter)="onRecipeReceived($event)"
    ></app-recipe-card>

  </div>
  <div class="paginator-container">
    <p-paginator (onPageChange)="paginate($event)" [rows]="ricettePerPagina" [totalRecords]="ricette.length"/>
  </div>
</div>
